name: Daily LiveLaw Scraper

on:
  schedule:
    # Runs everyday at 04:00 and 16:00 UTC (9:30 AM and 9:30 PM IST)
    - cron: '0 4,16 * * *'
  workflow_dispatch: # Allows you to manually click a button to run it whenever you want

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Scraping Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Scraper Script
      run: python scrape_judgments.py

    - name: Commit and Push Markdown updates
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.name "github-actions[bot]@users.noreply.github.com"
        git add judgments.md
        # Only commit if changes were actually made (to prevent empty commit errors)
        git diff-index --quiet HEAD || (git commit -m "Automated LiveLaw updates: $(date)" && git push)
